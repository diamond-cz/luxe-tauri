# ISP6S AE 参数映射配置
# 将图片同名 TOML 文件中的关键字映射到 Normal / Face 指示器下的参数显示。
#
# 格式说明：
#   左侧 = 卡片中显示的参数名（即表格 key 列）
#   右侧 = 图片同名 TOML 文件中对应的关键字（留空 "" 表示使用默认值 0）

# ─────────────────────────────────────────────────────────────────────────
# [card.Normal] 段：Normal 卡片（父卡 + 子卡片 MainT/HS/ABL/NS/BT/MT/DT）
#   CWR → 父卡头部 CWR 值的 TOML 关键字
#   wt  → 子卡片 WT 值的 TOML 关键字
#   tar → 子卡片 Tar 值的 TOML 关键字（留空 → 0）
# 驱动显示：
#   1) 子卡片头部 "WT | Tar" 徽章
#   2) Normal 父卡头部 "CWR | tar_abl_mt_hs | Cal" 复合徽章，计算公式：
#      tar_abl_mt_hs = (ABL.tar*ABL.wt + MT.tar*MT.wt + HS.tar*HS.wt)
#                      / (ABL.wt + MT.wt + HS.wt)
#      Cal           = ( tar_abl_mt_hs * (1024 - NS.wt) + NS.tar * NS.wt ) / 1024
#   3) Normal Tab 表格的 wt / tar 两列
# ─────────────────────────────────────────────────────────────────────────

[card.Normal]
CWR = "AE_TAG_PURE_AE_CWR"

[card.Normal.wt]
MainT    = "AE_TAG_HSV6_MAINT_WET"
HS    = "AE_TAG_HSV6_HS_WET"
BT = "AE_TAG_HSV6_BT_WET"
MT = "AE_TAG_HSV6_MT_WET"
DT = "AE_TAG_HSV6_DT_WET"
ABL   = "AE_TAG_PROB_ABL"
NS    = "AE_TAG_NS_PROB"

[card.Normal.tar]
MainT    = "AE_TAG_MTV6_MAINT_TARGET"
HS    = "AE_TAG_HSV6_HS_TARGET"
BT = "AE_TAG_HSV6_BT_TARGET"
MT = "AE_TAG_HSV6_MT_TARGET"
DT = "AE_TAG_HSV6_DT_TARGET"
ABL   = ""
NS    = "AE_TAG_NS_FINAL_TARGET"

# ─────────────────────────────────────────────────────────────────────────
# [card.face_touch] 段：Face / Touch 卡片（父卡 + 子卡片 Face / Touch）
#   CWR           → 父卡头部 CWR 值
#   LCE_Gain_num  → LCE_Gain 公式的分子
#   LCE_Gain_den  → LCE_Gain 公式的分母；分母为 0 时显示 0
#   LCE_Gain      = LCE_Gain_num / LCE_Gain_den （父卡徽章展示 "CWR | LCE_Gain"）
#
# [card.face_touch.Face]
#   wt_max  → 列表，wt 值取这些 TOML 关键字对应值的最大值
#   FBT     → FBT 值的 TOML 关键字（留空 → 0；待用户根据实际字段填写）
#   FLT     → FLT 值的 TOML 关键字
#   子卡片 "Face" 头部徽章显示："WT:xx | FBT:xx | FLT:xx"
#
# [card.face_touch.Touch]
#   wt_max  → 列表，wt 值取这些 TOML 关键字对应值的最大值
#   tar     → Tar 值的 TOML 关键字（留空 → 0）
#   子卡片 "Touch" 头部徽章显示："WT:xx | Tar:xx"
# ─────────────────────────────────────────────────────────────────────────

[card.face_touch]
CWR          = "AE_TAG_LINK_FACE_CWR_STABLE"
LCE_Gain_num = "AE_TAG_LINK_FACE_CWR_STABLE"
LCE_Gain_den = "AE_TAG_LINK_AE_CWR_STABLE"

[card.face_touch.Face]
wt_max = [
    "AE_TAG_PROB_FACE",
    "AE_TAG_PROB_FACE_THD",
    "AE_TAG_PROB_FACE_HBND",
    "AE_TAG_PROB_FACE_LBND",
    "AE_TAG_PROB_FACE_FLT_THD",
    "AE_TAG_PROB_FACE_FLT_HBND",
    "AE_TAG_PROB_FACE_FLT_DR",
]
FBT = "AE_TAG_FBT_TARGET"
FLT = "AE_TAG_FLT_TARGET"

[card.face_touch.Touch]
wt_max = [
    "AE_TAG_PROB_TOUCH",
    "AE_TAG_PROB_TOUCH_THD",
    "AE_TAG_PROB_TOUCH_HBND",
    "AE_TAG_PROB_TOUCH_LBND",
]
tar = ""                       # 默认 0；按需填入 TOML 关键字

# ─────────────────────────────────────────────────────────────────────────
# [Image] 段：定义 Image Tab 表格中除 idx/name 之外的附加列
# 格式：列名 = "图片同名 TOML 中的关键字"
# 列值来源：每张图片同名的 .toml 文件解析后按关键字查找；缺失则显示 "-"
# ─────────────────────────────────────────────────────────────────────────
[Image]
FaceSt      = "AE_TAG_FACE_20_FACE_AE_STABLE"
"1sSt"      = "AE_TAG_FACE_20_FACE_AE_1STSTABLE"
BV          = "AE_TAG_REALBVX1000"
CWV         = "AE_TAG_CWV"
hsevd       = "AE_TAG_HS_EVD"
nsevd       = "AE_TAG_NS_EVD"
FDR         = "AE_TAG_FLT_DR"
avgfdy      = "AE_TAG_FACE_AVGFDY_0"
gaufdy      = "AE_TAG_FACE_GAU_FDY_0"
FDY     = "AE_TAG_FLT_FDY"
Normal  = "AE_TAG_PURE_AE_CWR_STABLE"
Link_AE = "AE_TAG_LINK_AE_CWR_STABLE"
SZ_RA       = "AE_TAG_FLT_FDSZ_RA"
NS_Prob     = "AE_TAG_NS_PROB"
Link_Face   = "AE_TAG_LINK_FACE_CWR_STABLE"
FdMinCWR    = "AE_TAG_LINK_FACE_CWR_MIN"

# ─────────────────────────────────────────────────────────────────────────
# [LCE] 段：定义 LCE 选项卡的多分组表格（共 4 列：行标签 + 3 个数据列）
# 每个 [[LCE.group]] 对应一组，包含一行黄色高亮的列名标题 + 若干数据行
#   type = "row"    → 单行组
#       row_label 显示在数据行的首列（可省略，留空）
#       columns / keys 对应后 3 个数据列（最多 3 列，不足留空）
#   type = "series" → 序列组（如 LCE_P/LCE_O/GAP）
#       labels    每个元素生成一行，并作为该行的首列标签显示
#       columns   后 3 列的列名
#       patterns  后 3 列的 TOML 关键字模板，"{n}" 会替换为 labels 中的当前值
#                 留空字符串的列按 "前两列之差" 自动计算（典型用于 GAP = O - P）
# ─────────────────────────────────────────────────────────────────────────

[[LCE.group]]
type      = "row"
row_label = "LCE_LV"
columns   = ["LV", "LV_L", "LV_H"]
keys      = ["SW_LCE_LV", "SW_LCE_LVIdx_L", "SW_LCE_LVIdx_H"]

[[LCE.group]]
type      = "row"
row_label = "LCE_DR"
columns   = ["DR", "DR_L", "DR_H"]
keys      = ["SW_LCE_CurrDR", "SW_LCE_DRIdx_L", "SW_LCE_DRIdx_H"]

[[LCE.group]]
type     = "series"
columns  = ["LCE_P", "LCE_O", "GAP"]
labels   = ["0", "1", "50", "250", "500", "750", "950", "999"]
patterns = ["SW_LCE_P{n}", "SW_LCE_O{n}", ""]   # GAP 列留空表示 = O - P

[[LCE.group]]
type      = "row"
row_label = ""
columns   = ["DStr", "BStr"]
keys      = ["SW_LCE_DStrengthLevel", "SW_LCE_BStrengthLevel"]

