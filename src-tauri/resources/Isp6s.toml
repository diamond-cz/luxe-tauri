# ─────────────────────────────────────────────────────────────────────────
# [card_source] 段：卡片 → AE.cpp 源码位置映射（参数映射模式跳转用）
#
# 支持三类锚点，可任意组合（命中段全部合并，每段独立高亮）：
#
#   ① keywords    （推荐 · 易维护）
#       字符串列表；行内含任一关键字即命中。以 "re:" 开头视为 Python 正则。
#       维护方式：Notepad++ 里找到目标段的特征字符串（注释、字段名、TOML key
#       的字面量等）抄过来即可，AE.cpp 增删行也不会失效。
#
#   ② paths       （旧 · 兼容保留）
#       tree-sitter 字段路径列表，如 "[0][3][1][20]"。AE.cpp 结构改动后需要
#       重新核对索引。
#
#   ③ line_ranges （兜底 · 最直接）
#       [[start, end], ...] 直接写死 AE.cpp 行号区间；AE.cpp 增减行需手维护。
#
# 公共选项：
#   context   = "block" | "line" | <int>     keywords 命中后展开方式
#               - "block" : 展开到外层 { ... } 块（在嵌套结构上工作良好；
#                           AE.cpp 字段大多是扁平排列，命中独立花括号块内
#                           的字段时合适，命中段落注释如 "//CCU_strXxx" 时
#                           会回溯到父大结构，体积偏大 → 此场景请改用 <int>）
#               - "line"  : 仅高亮匹配行本身
#               - <int N> : 命中行 + 之后 N 行（推荐用于段落注释类锚点）
#   jump_to   = "first" | "min"     多段时滚动到哪段顶部，默认 "first"
#   highlight = "ranges" | "union"  多段独立显示 / 合并成一大块，默认 "ranges"
#
# 写法示例：
#   [card_source.MainT]
#   # 段落注释类锚点：用 context = N 控制范围
#   keywords = ["CCU_strMainTargetCFG"]
#   context  = 25
#
#   [card_source.WeightTbl]
#   # 字段名类锚点：在自带 {} 的嵌套块内 → block 模式精准定位
#   keywords = ["mt_wei_tbl"]
#   context  = "block"
#
#   [card_source.Face]
#   # 多类锚点合并：keywords + line_ranges 都生效
#   keywords    = ["face_lcelink_param"]
#   line_ranges = [[1018, 1080]]
#
#  三类锚点都接受列表，并且可以混用，命中段会合并：
#
#  [card_source.SomeCard]
#  keywords    = ["//HSv6p0CFG", "//MT", "re:^\\s*//DR\\b"]    # 多关键字 / 正则
#  paths       = ["[0][3][1][28]", "[0][3][1][36]"]            # 多路径
#  line_ranges = [[530, 568], [600, 640]]                      # 多行号段
#
#  context   = 30        # 关键字命中后展开多少行（也可 "block" / "line"）
#  jump_to   = "first"   # 多段时滚动到第一段顶部；改 "min" 则滚到行号最小那段
#  highlight = "ranges"  # 各段独立高亮；改 "union" 则合并成一大块

# ─────────────────────────────────────────────────────────────────────────

[card_source.MainT]
paths = ["[0][3][1][20]"]

[card_source.MTWV]
paths = ["[0][3][1][20]"]

[card_source.THD]
paths = ["[0][3][1][22]", "[0][3][1][23]", "[0][3][1][24]"]
jump_to = "first"
highlight = "ranges"

[card_source.CWV]
paths = []   # TODO: 在 Notepad++ 中确认 CWV 对应字段索引或关键字后填入
# 建议 keywords = ["CCU_strAECWRTempSmooth"]  context = 30

[card_source.Weight]
paths = ["[0][3][1][40]","[0][3][1][41]","[0][3][1][42]","[0][3][1][43]"]
jump_to   = "first"      # 多段时滚动到第一段顶部；改 "min" 则滚到行号最小那段
highlight = "ranges"     # 各段独立高亮；改 "union" 则合并成一大块

[card_source.HS]
# AE.cpp 中 HSv6p0CFG 整段（含 BT/MT/DT 三段，到 DR 前结束）
keywords  = ["//HSv6p0CFG"]
context   = 105
jump_to   = "first"
highlight = "ranges"

[card_source.BT]
keywords  = ["//BT"]
context   = 36
jump_to   = "first"
highlight = "ranges"

[card_source.MT]
keywords  = ["//MT"]
context   = 17
jump_to   = "first"
highlight = "ranges"

[card_source.DT]
keywords  = ["//DT"]
context   = 48
jump_to   = "first"
highlight = "ranges"

[card_source.AOE]
keywords  = ["//CCU_strAEAOEInputParm", "hdr_aoe_*"]
context   = "line"
jump_to   = "first"
highlight = "ranges"


# NS 下的 BT / DT 子卡（内部 ID 为 NS_BT / NS_DT，显示文字仍是 "BT" / "DT"）
# 跳转到 NSBVCFG 段（NS BV/THD 配置），与 HS 下的 BT/DT 区分开
[card_source.NS]
keywords  = ["//CCU_strNSBVCFG", "ns_bv_cfg_btthd"]
context   = 6
jump_to   = "first"
highlight = "ranges"

[card_source.NS_BT]
keywords  = ["//CCU_strNSBVCFG", "ns_bv_cfg_btthd"]
context   = 6
jump_to   = "first"
highlight = "ranges"

[card_source.NS_DT]
keywords  = ["//CCU_strNSBVCFG", "ns_bv_cfg_nsthd"]
context   = 6
jump_to   = "first"
highlight = "ranges"

[card_source.Face]
paths = ["[0][4][1][21]"]

[card_source.Touch]
paths = ["[0][2][1].19","[0][2][1].21","[0][2][1].27"]
jump_to = "first"
highlight = "ranges"


# ABL 段（//CCU_AE_ABL_SPEC_T）
[card_source.ABL]
keywords    = ["//CCU_AE_ABL_SPEC_T", "//CCU_strABL_absDiff"]    # 多关键字 / 正则
paths       = ["[0][3][1][28]", "[0][3][1][36]"]            # 多路径
context   = "line"       # 关键字命中后展开多少行（也可 "block" / "line"）
jump_to   = "first"      # 多段时滚动到第一段顶部；改 "min" 则滚到行号最小那段
highlight = "ranges"     # 各段独立高亮；改 "union" 则合并成一大块